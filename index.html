<button id="scan">SCAN</button>
<h1 id="text">-</h1>

<script>
document.getElementById("scan").onclick = async () => {

  try {

    const ndef = new NDEFReader();

    await ndef.scan();

    document.getElementById("text").innerText =
      "Tempel kartu";

    ndef.onreading = event => {

      document.getElementById("text").innerText =
        event.serialNumber;

    };

  } catch(e) {

    alert(e);

  }

}
</script>
